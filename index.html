<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ローグライクRPG</title>

<style>

body{
    background:#111;
    color:white;
    font-family:monospace;
    padding:20px;
}

button{
    margin:5px;
    padding:10px;
    font-size:16px;
}

input{
    padding:8px;
    margin:5px;
}

#status{
    border:1px solid #555;
    padding:10px;
    margin-bottom:10px;
}

#enemy{
    border:1px solid #555;
    padding:10px;
    margin-bottom:10px;
}

#message{
    border:1px solid #555;
    padding:10px;
    min-height:60px;
}

#deathArea{
    border:2px solid red;
    padding:10px;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>ローグライクRPG</h1>

<div id="status">
読み込み中...
</div>

<div id="enemy">
敵なし
</div>

<div id="message">
ゲーム開始
</div>

<div
id="deathArea"
style="display:none;">

<h2>死亡しました</h2>

<p>
名前を入力して死亡記録を残せます
</p>

<input
type="text"
id="playerName"
maxlength="20">

<button
id="saveDeathButton"
onclick="saveDeathRecord()">

死亡記録を残す

</button>

</div>

<div id="records">

<h3>死亡ランキング</h3>

<div id="recordList">
読み込み中...
</div>

</div>

<br>

<button onclick="startBattle()">
敵を探す
</button>

<button onclick="attackEnemy()">
攻撃
</button>

<button onclick="defend()">
防御
</button>

<button onclick="heal()">
回復
</button>

<button onclick="runAway()">
逃走
</button>

<br><br>

<button onclick="nextFloor()">
次の階へ
</button>

<button onclick="saveGame()">
セーブ
</button>

<button onclick="loadGame()">
ロード
</button>

<button onclick="resetGame()">
最初から
</button>

<script>

async function loadEnemy(){

    const response =
        await fetch("/enemy");

    const data =
        await response.json();

    if(
        data.enemy === null
    ){

        document
        .getElementById(
            "enemy"
        )
        .innerHTML =
        "敵なし";

        return;
    }

    document
    .getElementById(
        "enemy"
    )
    .innerHTML =

`
敵 : ${data.enemy}<br>
HP : ${data.hp}
`;

}

async function loadRecords(){

    const response =
        await fetch(
            "/death_records"
        );

    const data =
        await response.json();

    let html = "";

    for(
        const row
        of data
    ){

        html +=

`
${row.player_name}
 Lv${row.level}
 /
 ${row.floor}階
 /
 ${row.enemy_name}
 /
 ${row.death_time}
<br>
`;

    }

    document
    .getElementById(
        "recordList"
    )
    .innerHTML =
    html;

}

async function saveDeathRecord(){

    const playerName =

        document
        .getElementById(
            "playerName"
        )
        .value;

    const response =

        await fetch(
            "/save_death_record",
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify(
                    {
                        player_name:
                        playerName
                    }
                )
            }
        );

    const data =
        await response.json();

    if(
        data.status ===
        "already_saved"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        "死亡記録は保存済み";

        return;
    }

    document
    .getElementById(
        "message"
    )
    .innerHTML =

    "死亡記録を保存しました";

    document
    .getElementById(
        "saveDeathButton"
    )
    .disabled = true;

    document
    .getElementById(
        "playerName"
    )
    .disabled = true;

    loadRecords();

}

async function startBattle(){

    const response =
        await fetch(
            "/start_battle"
        );

    const data =
        await response.json();

    if(
        data.status ===
        "battle_start"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        data.enemy +
        " が現れた！";

    }

    else if(
        data.status ===
        "already"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        "すでに戦闘中";

    }

    else{

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        "ゲームオーバー";

    }

    loadEnemy();

}

async function attackEnemy(){

    const response =
        await fetch(
            "/attack"
        );

    const data =
        await response.json();

    if(
        data.status ===
        "no_enemy"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        "敵がいない";

    }

    else if(
        data.status ===
        "victory"
    ){

        if(
            data.level_up
        ){

            document
            .getElementById(
                "message"
            )
            .innerHTML =

            data.enemy +
            " を倒した！<br>レベルアップ！";

        }

        else{

            document
            .getElementById(
                "message"
            )
            .innerHTML =

            data.enemy +
            " を倒した！";

        }

    }

    
    else if(
        data.status ===
        "continue"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        "戦闘続行<br>" +
        "敵HP : " +
        data.enemy_hp +
        "<br>" +
        "自分HP : " +
        data.player_hp;

    }

    else{

        document
        .getElementById(
            "message"
        )
        .innerHTML =

        "死亡しました";

    }

    loadPlayer();
    loadEnemy();

}

async function defend(){

    const response =
        await fetch(
            "/defend"
        );

    const data =
        await response.json();

    if(
        data.status ===
        "no_enemy"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "敵がいない";

    }

    else if(
        data.status ===
        "defended"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "防御した";

    }

    else{

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "死亡しました";

    }

    loadPlayer();

}

async function heal(){

    const response =
        await fetch(
            "/heal"
        );

    const data =
        await response.json();

    if(
        data.status ===
        "no_enemy"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "戦闘中のみ回復可能";

    }

    else if(
        data.status ===
        "heal_limit"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "回復は2回まで";

    }

    else if(
        data.status ===
        "healed"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "HP回復";

    }

    else{

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "死亡しました";

    }

    loadPlayer();

}

async function runAway(){

    const response =
        await fetch(
            "/run"
        );

    const data =
        await response.json();

    if(
        data.status ===
        "no_enemy"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "敵がいない";

    }

    else if(
        data.status ===
        "escaped"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "逃走成功";

    }

    else if(
        data.status ===
        "failed_escape"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "逃走失敗";

    }

    else{

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "死亡しました";

    }

    loadPlayer();
    loadEnemy();

}

async function nextFloor(){

    const response =
        await fetch(
            "/next_floor"
        );

    const data =
        await response.json();

    if(
        data.status ===
        "battle_first"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "敵を倒してから進む";

    }

    else if(
        data.status ===
        "ok"
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        data.floor +
        "階へ進んだ";

    }

    else{

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "ゲームオーバー";

    }

    loadPlayer();

}

function saveGame(){

    const saveData = {

        level:
        window.currentPlayer.level,

        exp:
        window.currentPlayer.exp,

        hp:
        window.currentPlayer.hp,

        max_hp:
        window.currentPlayer.max_hp,

        attack:
        window.currentPlayer.attack,

        defense:
        window.currentPlayer.defense,

        floor:
        window.currentPlayer.floor

    };

    localStorage.setItem(
        "roguelike_save",
        JSON.stringify(
            saveData
        )
    );

    document
    .getElementById(
        "message"
    )
    .innerHTML =
    "セーブ完了";

}

async function loadGame(){

    const raw =
        localStorage.getItem(
            "roguelike_save"
        );

    if(
        raw === null
    ){

        document
        .getElementById(
            "message"
        )
        .innerHTML =
        "セーブなし";

        return;

    }

    const data =
        JSON.parse(raw);

    await fetch(
        "/import_save",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify(
                data
            )
        }
    );

    document
    .getElementById(
        "message"
    )
    .innerHTML =
    "ロード完了";

    loadPlayer();
    loadEnemy();

}

async function resetGame(){

    await fetch(
        "/reset"
    );

    localStorage.removeItem(
        "roguelike_save"
    );

    document
    .getElementById(
        "deathArea"
    )
    .style.display =
    "none";

    document
    .getElementById(
        "playerName"
    )
    .value = "";

    document
    .getElementById(
        "playerName"
    )
    .disabled = false;

    document
    .getElementById(
        "saveDeathButton"
    )
    .disabled = false;

    document
    .getElementById(
        "message"
    )
    .innerHTML =
    "最初から開始";

    loadPlayer();
    loadEnemy();

}

async function loadPlayer(){

    const response =
        await fetch(
            "/player"
        );

    const data =
        await response.json();

    window.currentPlayer =
        data;

    document
    .getElementById(
        "status"
    )
    .innerHTML =

`
Lv : ${data.level}<br>
HP : ${data.hp}/${data.max_hp}<br>
攻撃 : ${data.attack}<br>
防御 : ${data.defense}<br>
EXP : ${data.exp}<br>
Floor : ${data.floor}
`;

    if(
        data.dead
    ){

        document
        .getElementById(
            "deathArea"
        )
        .style.display =
        "block";

    }
    else{

        document
        .getElementById(
            "deathArea"
        )
        .style.display =
        "none";

    }

}

loadPlayer();
loadEnemy();
loadRecords();

</script>

</body>
</html>
